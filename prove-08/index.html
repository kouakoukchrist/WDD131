<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Snortleblat Card</title>

  <!-- Open Graph -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="Snortleblat Card">
  <meta property="og:description" content="A cool character card preview.">
  <meta property="og:url" content="https://kouakoukchrist.github.io/WDD131/prove-08/">
  <meta property="og:image" content="https://kouakoukchrist.github.io/WDD131/prove-08/snortleblat.webp">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Snortleblat Card">
  <meta name="twitter:description" content="A cool character card preview.">
  <meta name="twitter:image" content="https://kouakoukchrist.github.io/WDD131/prove-08/snortleblat.webp">

  <!-- Favicon -->
  <link rel="icon" href="/favicon.ico">
  <link rel="apple-touch-icon" href="/images/apple-touch-icon.png">

  <!-- CSS -->
  <link rel="stylesheet" href="prove.css">
  <script defer src="prove.js"></script>
</head>

<body>

  <div class="card">
    <img class="image" src="snortleblat.webp" alt="Snortleblat image">

    <div class="name">Snortleblat</div>

    <div class="stats">
      <p>Class: Swamp Beast Diploma</p>
      <p id="characterLevel">Level: 8</p>
      <p id="characterHealth">Health: 100</p>
    </div>

    <div class="buttons">
      <button id="characterAttacked">Attacked</button>
      <button id="characterLevelUp">Level Up</button>
    </div>
  </div>

</body>
</html>
