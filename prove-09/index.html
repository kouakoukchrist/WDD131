<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recipe Book</title>

    <meta property="og:type" content="website">
    <meta property="og:title" content="Recipe Book">
    <meta property="og:description" content="Simple and delicious fall desserts.">
    <meta property="og:image" content="images/social-preview.png">

    <link rel="icon" href="/favicon.ico">
    <link rel="apple-touch-icon" href="images/apple-touch-icon.png">
    <link rel="stylesheet" href="prove.css">
</head>
<body>

  <div id="container">

    <header id="title-image">
      <img src="images/recipe-book.png" alt="logo" height="80" width="80">
      <h1>RecipeBook</h1>
    </header>

    <div class="form">
      <form action="/search">
        <input type="text" placeholder="Find a recipe">
        <img src="images/search.svg" alt="search icon" height="20" width="20">
      </form>
    </div>

    <hr>
    
    <article class="card">
      <img src="images/apple-crisp.jpg" alt="Apple Crisp served with vanilla ice cream">
      
      <div class="card-content">
        <button class="button">dessert</button>
        <h2 class="crisp">Apple Crisp</h2>

        <div class="rating" role="img" aria-label="Rating: 4 out of 5 stars">
          <span aria-hidden="true">★</span>
          <span aria-hidden="true">★</span>
          <span aria-hidden="true">★</span>
          <span aria-hidden="true">★</span>
          <span aria-hidden="true" style="color: #ccc;">☆</span>
        </div>

        <p class="description">
          This apple crisp recipe is a simple yet delicious fall dessert 
          that's great served warm with vanilla ice cream.
        </p>
      </div>
    </article>

    <footer>
      <div class="social">
        <a href="#"><img src="images/instagram_icon.svg" alt="Instagram" height="20" width="20"></a>
        <a href="#"><img src="images/youtube_icon.svg" alt="YouTube" height="20" width="20"></a>
        <a href="#"><img src="images/pinterest_icon.svg" alt="Pinterest" height="20" width="20"></a>
      </div>

      <div id="reference">
        <a class="top" href="https://www.flaticon.com/free-icons/recipe" title="recipe icons">
          Recipe icons created by Freepik - Flaticon
        </a>
      </div>
    </footer>

  </div>

</body>
</html>
