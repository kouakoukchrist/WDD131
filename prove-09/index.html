<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recipe Book</title>

    <meta property="og:type" content="website">
    <meta property="og:title" content="Your Title">
    <meta property="og:description" content="Your Description">
    <meta property="og:url" content="Your URL">
    <meta property="og:image" content="social-preview-image.png">

    <meta name="twitter:card" content="Social Preview Image">
    <meta name="twitter:title" content="Your Title">
    <meta name="twitter:description" content="Your Description">
    <meta name="twitter:image" content="social-preview-image.png">

    <link rel="icon" href="/favicon.ico">

    <link rel="apple-touch-icon" href="images/apple-touch-icon.png">
    
    <link rel="stylesheet" href="prove.css">
</head>
<body>

  <div id="container">

    <div id="title-image">
      <img src="images/recipe-book.png" alt="logo" height="100" width="100">
      <h1>RecipeBook</h1>
    </div>

    <div class="form">
      <form action="menu">
        <input type="text" placeholder="Find a recipe">
        <img src="images/search.svg" alt="search icon" height="20" width="20">
      </form>
    </div>

    <hr>
    
    <article class="card">
      <img src="images/apple-crisp.jpg" alt="Apple Crisp">
      
      <div class="card-content">
        <button class="button">dessert</button>
        <span class="crisp">Apple Crisp</span>

        <span class="rating" role="img" aria-label="Rating: 4 out of 5 stars">
          <span aria-hidden="true" class="icon-star">⭐</span>
          <span aria-hidden="true" class="icon-star">⭐</span>
          <span aria-hidden="true" class="icon-star">⭐</span>
          <span aria-hidden="true" class="icon-star">⭐</span>
          <span aria-hidden="true" class="icon-star-empty">☆</span>
        </span>

        <p class="description">
          This apple crisp recipe is a simple yet delicious fall dessert 
          that's great served warm with vanilla ice cream.
        </p>
      </div>
    </article>


    <footer>
      <div class="social">
        <a href="#"><img src="images/instagram_icon.svg" alt="Instagram" height="20" width="20"></a>
        <a href="#"><img src="images/youtube_icon.svg" alt="YouTube" height="20" width="20"></a>
        <a href="#"><img src="images/pinterest_icon.svg" alt="Pinterest" height="20" width="20"></a>
      </div>

      <div id="reference">
        <a class="top" href="https://www.flaticon.com/free-icons/recipe" title="recipe icons">
          Recipe icons created by Freepik - Flaticon
        </a>
      </div>
    </footer>

  </div>

</body>
</html>
