<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Credit Card Form</title>
  <link rel="stylesheet" href="prove.css">
  <script defer src="prove.js"></script>
</head>
<body>

<form class="form-grid">
  <section class="card-front">
    <div class="total">TOTAL: $199</div>
    <div class="card-logo">💳</div>

    <div class="field card-number">
      <label for="card-num">CARD NUMBER</label>
      <input type="tel" 
        id="card-num" 
        inputmode="numeric"
       placeholder="1234 5678 9101 1020">
    </div>

    <div class="field card-holder">
      <label for="holder">CARD HOLDER</label>
      <input type="text" id="holder" placeholder="John Doe">
    </div>

    <div class="field expiration">
      <label>EXPIRATION</label>
      <div class="exp-inputs">
        <input type="tel" id="mm" inputmode="numeric" placeholder="MM" maxlength="2" aria-label="Expiration Month">
        <input type="tel" id="yy" inputmode="numeric" placeholder="YY" maxlength="2" aria-label="Expiration Year">
      </div>
    </div>
  </section>

  <section class="card-back">
    <div class="black-stripe"></div>
    <div class="field cvv">
      <label for="cvv">CVC/CVV</label>
      <input type="tel" id="cvv" inputmode="numeric" placeholder="XXX" maxlength="4">
    </div>
  </section>

  <div class="submit-area">
    <button type="submit" class="submit-btn">Submit</button>
  </div>
</form>

</body>
</html>
